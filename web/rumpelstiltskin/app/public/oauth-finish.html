<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secure — Completing Sign-in</title>
  <style>
    :root {
      --bg: #050805;
      --text: #4ade80;
      --muted: #166534;
      --border: #1a331a;
      --scanline: rgba(74, 222, 128, 0.05);
    }

    * {
      box-sizing: border-box;
      border-radius: 0 !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Courier New', Courier, monospace;
      color: var(--text);
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 1px,
          var(--scanline) 2px,
          var(--scanline) 3px);
      pointer-events: none;
      z-index: 100;
    }

    .card {
      width: min(520px, 92vw);
      border: 2px solid var(--border);
      background: rgba(15, 26, 15, 0.9);
      padding: 18px;
      box-shadow: 5px 5px 0px var(--border);
    }

    .muted {
      color: var(--muted);
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2 style="margin:0 0 6px 0; font-size:16px; letter-spacing:.4px;">Secure</h2>
    <p class="muted" style="margin:0">Completing sign-in…</p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");

    try {
      const target = window.opener || window.parent;
      if (target && code) {
        // Vulnerability: wildcard target origin.
        target.postMessage({ type: "oauth_callback", code }, "*");
      }
    } catch (e) { }

    document.body.innerHTML =
      '<div class="card"><h2 style="margin:0 0 6px 0; font-size:16px; letter-spacing:.4px;">Secure</h2><p class="muted" style="margin:0">Done. You may close this window.</p></div>';
  </script>
</body>

</html>
