<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #21191a;
        --muted: #686064;
        --page: #f7f5f2;
        --panel: #ffffff;
        --line: #dfd9d2;
        --green: #c81d25;
        --green-dark: #98161c;
        --gold: #d8a928;
        --red: #98161c;
        --track: #2e3038;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--page);
        color: var(--ink);
      }
      .wrap {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 28px;
      }
      .brand {
        color: var(--green-dark);
        font-size: 1.05rem;
        font-weight: 900;
        letter-spacing: 0;
        text-decoration: none;
      }
      .nav {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }
      .link,
      button.link {
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }
      .link.primary,
      button.primary {
        border-color: var(--green);
        background: var(--green);
        color: #fff;
      }
      .flash {
        margin: 0 0 16px;
        padding: 13px 15px;
        border: 1px solid var(--line);
        border-left: 5px solid var(--green);
        border-radius: 8px;
        background: var(--panel);
      }
      .flash.error {
        border-left-color: var(--red);
      }
      .auth {
        min-height: calc(100vh - 150px);
        display: grid;
        align-content: center;
        justify-items: center;
      }
      .auth .page-head {
        display: block;
        width: min(520px, 100%);
        margin-bottom: 18px;
        text-align: center;
      }
      .auth .lead {
        margin-left: auto;
        margin-right: auto;
      }
      .auth-card {
        width: min(520px, 100%);
      }
      .page-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(2.2rem, 6vw, 4.7rem);
        line-height: 0.95;
        letter-spacing: 0;
      }
      .lead {
        max-width: 680px;
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }
      .stat {
        min-width: 240px;
      }
      .stat strong {
        display: block;
        color: var(--green-dark);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .stat span {
        display: block;
        margin-top: 8px;
        font-size: 1.8rem;
        font-weight: 900;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }
      .stack {
        display: grid;
        gap: 14px;
      }
      label {
        display: block;
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 0.9rem;
      }
      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 11px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }
      .card button,
      .button {
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 44px;
        margin-top: 12px;
        border: 0;
        border-radius: 8px;
        padding: 9px 12px;
        background: var(--green);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }
      .card button.secondary,
      .button.secondary {
        background: var(--track);
      }
      .muted {
        color: var(--muted);
      }
      @media (max-width: 820px) {
        .page-head,
        .grid {
          grid-template-columns: 1fr;
        }
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }
        .nav,
        .stat {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <nav class="topbar" aria-label="Primary">
        <a class="brand" href="{{ url_for('index') }}">{{ app_name }}</a>
        <div class="nav">
          {% if user %}
            <a class="link" href="{{ url_for('index') }}">Shop</a>
            <form method="post" action="{{ url_for('logout_form') }}">
              <button class="link" type="submit">Logout</button>
            </form>
          {% else %}
            <a class="link" href="{{ url_for('login_page') }}">Login</a>
            <a class="link primary" href="{{ url_for('register_page') }}">Register</a>
          {% endif %}
        </div>
      </nav>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
